name: Lean

# Separate from the main `CI` workflow: the Kimchi formalization has its own
# toolchain (elan / lake / Mathlib), needs no git submodules, and is independent
# of the PureScript/Rust build — so it runs in parallel and only when `formal/`
# (or this file) changes.
on:
  push:
    branches: [ main ]
    paths:
      - 'formal/**'
      - '.github/workflows/lean.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'formal/**'
      - '.github/workflows/lean.yml'
  workflow_dispatch:

permissions:
  contents: read

# One run per ref; newer pushes cancel the in-flight build.
concurrency:
  group: lean-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & check (Kimchi formalization)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: formal
    steps:
    - uses: actions/checkout@v4
      with:
        # No submodules: the Lean project depends only on Mathlib (fetched by lake).
        submodules: false

    - name: Lean style check
      working-directory: .
      run: bash formal/scripts/check-style.sh

    - name: Install elan (reads the pinned toolchain from lean-toolchain)
      run: |
        curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
          | sh -s -- -y --default-toolchain none
        echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

    - name: Fetch deps + build the library (= check every proof)
      run: |
        export PATH="$HOME/.elan/bin:$PATH"
        # Mathlib olean cache (does NOT include ProofWidgets' widget JS).
        lake exe cache get
        # ProofWidgets ships its prebuilt widget JS as a GitHub *cloud release*
        # (`ProofWidgets4.tar.gz`), which `lake exe cache get` does not fetch.
        # Without it, `lake build` hits ProofWidgets' `errorOnBuild` guard
        # ("ProofWidgets not up-to-date"). Fetch + extract it ourselves.
        pw=.lake/packages/proofwidgets
        rev=$(jq -r '.packages[] | select(.name=="proofwidgets") | .inputRev' lake-manifest.json)
        echo "Fetching ProofWidgets cloud release $rev (prebuilt widget JS)"
        mkdir -p "$pw/.lake/build"
        curl -fsSL "https://github.com/leanprover-community/ProofWidgets4/releases/download/${rev}/ProofWidgets4.tar.gz" \
          | tar xz -C "$pw/.lake/build"
        # Build only our library: typechecks every proof and runs the `#eval`s.
        lake build Kimchi

    # `lake build` succeeds even with `sorry` (it's only a warning), so gate
    # explicitly: every headline theorem must reduce to the standard axioms with
    # no `sorryAx` in its closure.
    - name: Verify proofs are sorry-free
      run: |
        export PATH="$HOME/.elan/bin:$PATH"
        cat > check_axioms.lean <<'EOF'
        import Kimchi
        #print axioms Kimchi.Gate.AddComplete.sound_noninf
        #print axioms Kimchi.Gate.AddComplete.complete_noninf
        #print axioms Kimchi.Gate.AddComplete.sound_point_noninf
        #print axioms Kimchi.Gate.AddComplete.sound_point_inf
        #print axioms Kimchi.Gate.AddComplete.ok_iff
        #print axioms Kimchi.Gate.VarBaseMul.ok_iff
        #print axioms Kimchi.Gate.VarBaseMul.singleBitOk_iff
        #print axioms Kimchi.Gate.VarBaseMul.secant_add
        #print axioms Kimchi.Gate.VarBaseMul.singleBit_sound
        #print axioms Kimchi.Gate.VarBaseMul.gate_scalarMul
        #print axioms Kimchi.Gate.VarBaseMul.signed_target
        #print axioms Kimchi.Gate.VarBaseMul.gate_scalarMul_int
        #print axioms Kimchi.Circuit.VarBaseMul.chain_scalarMul
        #print axioms Kimchi.Circuit.VarBaseMul.chain_register
        #print axioms Kimchi.Circuit.VarBaseMul.scalarMul
        #print axioms Kimchi.Circuit.VarBaseMul.scalarMul_baseMul
        #print axioms Kimchi.Circuit.VarBaseMul.scalarMul_shifted
        #print axioms Kimchi.Circuit.VarBaseMul.unshiftType1_shiftType1
        #print axioms Kimchi.Circuit.VarBaseMul.scalarMul_caller
        #print axioms Kimchi.Circuit.VarBaseMul.scalarMul_type2
        #print axioms Kimchi.Cycle.zsmul_mod
        #print axioms Kimchi.Cycle.varBaseMul_scalar
        #print axioms Kimchi.Cycle.varBaseMul_faithful
        EOF
        out=$(lake env lean check_axioms.lean)
        echo "$out"
        if echo "$out" | grep -q sorryAx; then
          echo "::error::a headline proof depends on sorryAx"
          exit 1
        fi
