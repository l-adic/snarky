name: Lean

# Separate from the main `CI` workflow: the Kimchi formalization has its own
# toolchain (elan / lake / Mathlib) and is independent of the PureScript/Rust
# build — so it runs in parallel and only when `formal/` (or this file) changes.
# It needs one git submodule, the CompElliptic dependency (initialized below);
# the large `mina` submodule is skipped.
on:
  push:
    branches: [ main ]
    paths:
      - 'formal/**'
      - '.github/workflows/lean.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'formal/**'
      - '.github/workflows/lean.yml'
  workflow_dispatch:

permissions:
  contents: read

# One run per ref; newer pushes cancel the in-flight build.
concurrency:
  group: lean-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & check (Kimchi formalization)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: formal
    steps:
    - uses: actions/checkout@v4
      with:
        # Skip submodules here so the large `mina` submodule isn't fetched; the
        # CompElliptic dependency submodule is initialized on its own below.
        submodules: false

    - name: Check out the CompElliptic dependency submodule
      working-directory: .
      run: git submodule update --init formal/vendor/CompElliptic

    - name: Lean style check
      working-directory: .
      run: bash formal/scripts/check-style.sh

    - name: Install elan (reads the pinned toolchain from lean-toolchain)
      run: |
        curl -sSfL https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
          | sh -s -- -y --default-toolchain none
        echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

    - name: Fetch deps + build the library (= check every proof)
      run: |
        export PATH="$HOME/.elan/bin:$PATH"
        # Ensure the manifest matches the Mathlib revision pinned in lakefile.toml
        # so `lake exe cache get` does not fail on toolchain mismatch checks.
        lake update mathlib
        # Mathlib olean cache (does NOT include ProofWidgets' widget JS).
        lake exe cache get
        # Older ProofWidgets tags ship prebuilt widget JS in a GitHub release
        # asset (`ProofWidgets4.tar.gz`) that `lake exe cache get` does not
        # fetch. Newer tags vendor this differently and may not publish the
        # tarball, so treat the download as best-effort.
        pw=.lake/packages/proofwidgets
        rev=$(jq -r '.packages[] | select(.name=="proofwidgets") | .inputRev' lake-manifest.json)
        url="https://github.com/leanprover-community/ProofWidgets4/releases/download/${rev}/ProofWidgets4.tar.gz"
        echo "Checking ProofWidgets cloud release $rev for prebuilt widget JS"
        mkdir -p "$pw/.lake/build"
        if curl -fsI "$url" >/dev/null; then
          echo "Fetching ProofWidgets cloud release asset"
          curl -fsSL "$url" | tar xz -C "$pw/.lake/build"
        else
          echo "No ProofWidgets release tarball for $rev; continuing"
        fi
        # Build only our library: typechecks every proof and runs the `#eval`s.
        lake build Kimchi

    # `lake build` succeeds even with `sorry` (it's only a warning), so gate
    # explicitly: every headline theorem must reduce to the allowed axiom set (the
    # standard logical axioms plus the two trusted Pasta point counts). This catches
    # a `sorryAx` AND any other stray axiom. Roots/allowlist live in the script.
    - name: Verify headline proofs use only the allowed axioms
      run: |
        export PATH="$HOME/.elan/bin:$PATH"
        scripts/check_axioms.sh

    # The committed fixtures are real PureScript-dumped (circuit, witness) pairs; the
    # verified `check` (faithful by `check_iff`) must accept each. This guards against
    # drift between what snarky emits and what the Lean constraints model.
    - name: Run the verified checker on committed circuit fixtures
      working-directory: .
      run: make lean-check-fixtures
