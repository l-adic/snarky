name: Lean

# Separate from the main `CI` workflow: the Kimchi formalization has its own
# toolchain (elan / lake / Mathlib) and is independent of the PureScript/Rust
# build — so it runs in parallel and only when `formal/` (or this file) changes.
# No submodules are needed: every Lean dependency (Mathlib, CompElliptic, ironwood)
# is a lake git require; the large `mina` submodule is skipped.
on:
  push:
    branches: [ main ]
    paths:
      - 'formal/**'
      - '.github/workflows/lean.yml'
      - '.github/actions/setup-lean/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'formal/**'
      - '.github/workflows/lean.yml'
      - '.github/actions/setup-lean/**'
  workflow_dispatch:

permissions:
  contents: read

# One run per ref; newer pushes cancel the in-flight build.
concurrency:
  group: lean-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & check (Kimchi formalization)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: formal
    steps:
    - uses: actions/checkout@v4
      with:
        # No submodules: the large `mina` submodule is skipped, and every Lean
        # dependency (Mathlib, CompElliptic, ironwood) is a lake git require.
        submodules: false

    - name: Lean style check
      working-directory: .
      run: bash formal/scripts/check-style.sh

    # No bare structural dimension (6/7/15/43/44) in a type position — the
    # Kimchi/Columns.lean shape constants are mandatory across Kimchi/ (minus
    # Gate/), the KimchiFixture decoders, and the kimchi/scripts/*.lean drivers.
    # Pure source scan with a scanned-file-count floor; the out-of-scope policy
    # (gate-internal constants, proof-side arithmetic) is documented in the
    # script header.
    - name: Shape-literal gate
      run: bash kimchi/scripts/check_shape_literals.sh

    # elan + Mathlib olean cache + the Kimchi build-directory cache + `lake build
    # Kimchi` — shared with the `check-ps-witness` job in the CI workflow.
    - name: Setup Lean + build the library (= check every proof)
      uses: ./.github/actions/setup-lean

    # `lake build` succeeds even with `sorry` (it's only a warning), so gate
    # explicitly: every headline theorem must reduce to the allowed axiom set (the
    # standard logical axioms plus the two trusted Pasta point counts). This catches
    # a `sorryAx` AND any other stray axiom. Roots/allowlist live in the script.
    - name: Verify headline proofs use only the allowed axioms
      run: |
        export PATH="$HOME/.elan/bin:$PATH"
        lake env lean kimchi/scripts/check_axioms.lean

    # Per-package trust-surface gates: each package audits the axiom closure of its own
    # surface (pasta: the derived trust base, no eigen; bulletproof-pcs: the PCS
    # soundness surface over its declared FS axioms). Run from the root workspace.
    - name: Gate the pasta and bulletproof-pcs trust surfaces
      run: |
        export PATH="$HOME/.elan/bin:$PATH"
        lake env lean pasta/scripts/check_axioms.lean
        lake env lean bulletproof-pcs/scripts/check_axioms.lean

    # The snarky DSL package's interpreter laws (pure core Lean — standard axioms
    # only). The aggregator workspace requires snarky, so this runs here directly.
    - name: Gate the snarky DSL interpreter laws
      run: |
        export PATH="$HOME/.elan/bin:$PATH"
        lake env lean snarky/scripts/check_axioms.lean

    # Batteries' `@[env_linter]` suite (docBlame, unusedArguments, synTaut, …) over
    # every library root. One runLinter process per module — a single multi-module run
    # accumulates each module's import environment and gets OOM-killed. Keep the list
    # in sync with lintDriverArgs in lakefile.toml. The nolints baseline
    # (derive-generated instances and by-design findings only) is scripts/nolints.json.
    - name: Run the environment linters
      run: |
        export PATH="$HOME/.elan/bin:$PATH"
        for m in Kimchi KimchiFixture Snarky Pasta Poseidon FixtureKit \
                 Bulletproof BulletproofFixture; do
          lake exe runLinter "$m" || exit 1
        done

    # No redundant or removable imports (mathlib's shake). The policy exceptions live in
    # scripts/noshake.json: wholesale `import Mathlib` in the proof-heavy trees, and the
    # notation-only Kimchi.Columns (notations contribute no constants, so shake cannot
    # see their use).
    # The --cfg path must be absolute: `lake exe` runs the tool from its owning
    # package's directory (mathlib's), so the relative default resolves wrongly.
    - name: Check import hygiene (shake)
      run: |
        export PATH="$HOME/.elan/bin:$PATH"
        lake exe shake --cfg "$PWD/scripts/noshake.json" \
          Kimchi KimchiFixture Snarky Pasta Poseidon FixtureKit \
          Bulletproof BulletproofFixture

    # Every authored declaration must be reachable from the union of the packages'
    # roots.txt API manifests (scripts/deadcode.lean).
    - name: Check for dead code
      run: |
        export PATH="$HOME/.elan/bin:$PATH"
        bash scripts/deadcode.sh

    # Compatibility: the IPA verifier model must accept real kimchi/proof-systems
    # transcripts, and both chunk-fold mechanisms must match production — the chunk
    # layer's recombination (fixtures/ipa_{opening,batch,chunked2,chunked3}_*.json,
    # combine-then-open, 1-3 chunks) and the chunked-batch segment stream
    # (fixtures/ipa_chunked_{batch,ragged}_*.json, multi-chunk PolyComms through the
    # batch path, uniform and ragged chunk counts); all generated by
    # tools/fixture-dump's ipa_dump from the production prover. Pure data check — no
    # Rust toolchain needed here.
    - name: Check the IPA model against kimchi transcript fixtures
      run: |
        export PATH="$HOME/.elan/bin:$PATH"
        BULLETPROOF_FIXTURES_DIR=bulletproof-pcs/fixtures \
          lake env lean bulletproof-pcs/scripts/check_ipa_fixture.lean

    # The Poseidon sponges over both Pasta fields must match mina_poseidon
    # absorb/squeeze traces (poseidon/fixtures/poseidon_{fq,fp}_vectors.json, from sponge_dump).
    - name: Check the Poseidon sponges against mina_poseidon traces
      run: |
        export PATH="$HOME/.elan/bin:$PATH"
        POSEIDON_FIXTURES_DIR=poseidon/fixtures \
          lake env lean poseidon/scripts/check_sponge_vectors.lean

    # The Fq-sponge and map-to-curve must match DefaultFqSponge op traces and
    # group_map vectors recorded from proof-systems directly.
    - name: Check the Fq-sponge and map-to-curve against vectors
      run: |
        export PATH="$HOME/.elan/bin:$PATH"
        POSEIDON_FIXTURES_DIR=poseidon/fixtures \
          lake env lean poseidon/scripts/check_fq_sponge.lean

    # The permutation-argument row semantics must hold on production kimchi data
    # (fixtures/perm_vesta.json, from tools/fixture-dump's perm_dump).
    - name: Check the permutation argument against kimchi row data
      run: |
        export PATH="$HOME/.elan/bin:$PATH"
        KIMCHI_FIXTURES_DIR=kimchi/fixtures \
          lake env lean kimchi/scripts/check_perm_fixture.lean

    # The index model against the mixed-gate circuit at both chunking regimes on both
    # curves (fixtures/index_vesta.json, index_{vesta,pallas}_nc2.json, from index_dump).
    - name: Check the index model against the mixed-gate fixture
      run: |
        export PATH="$HOME/.elan/bin:$PATH"
        KIMCHI_FIXTURES_DIR=kimchi/fixtures \
          lake env lean kimchi/scripts/check_index_fixture.lean

    # The closed-form verifier linearization (perm_scalars, the gate constant term,
    # ft_eval0) must reproduce, by value, the production scalar side of a real proof —
    # including the token-evaluated constant term (fixtures/linearization_vesta.json,
    # from tools/fixture-dump's linearization_dump).
    - name: Check the verifier linearization against the production scalar side
      run: |
        export PATH="$HOME/.elan/bin:$PATH"
        KIMCHI_FIXTURES_DIR=kimchi/fixtures \
          lake env lean kimchi/scripts/check_linearization.lean

    # The composed executable verifier against complete production wire proofs
    # (fixtures/kimchi_proof_{vesta,vesta_pub,vesta_nc2,pallas_nc2,vesta_nc8}.json, from
    # the kimchi_proof_dump binaries).
    - name: Check the executable kimchi verifier against a production proof
      run: |
        export PATH="$HOME/.elan/bin:$PATH"
        KIMCHI_FIXTURES_DIR=kimchi/fixtures \
          lake env lean kimchi/scripts/check_kimchi_verifier.lean

    # The verifier-key <-> index correspondence across both curves and both regimes
    # (the Vesta and Pallas VKs against index_{vesta,pallas}*.json).
    - name: Check the verifier key corresponds to the index
      run: |
        export PATH="$HOME/.elan/bin:$PATH"
        KIMCHI_FIXTURES_DIR=kimchi/fixtures \
          lake env lean kimchi/scripts/check_vk_correspond.lean

    # Kernel replay (lean4checker): re-read every library .olean and replay each
    # declaration through the kernel alone, detecting environment tampering that
    # elaboration-time checks — the build and the axiom gates — inherently trust.
    # The script prunes stale oleans first (deleted/renamed modules linger in the
    # cached build dirs and would otherwise be replayed too).
    #
    # Runs on pushes to main (and manual dispatch) only, NOT on PRs: every module
    # replay reloads its Mathlib-sized import environment, so the sweep costs
    # ~15 runner-minutes — and every commit that lands still gets the full replay.
    # A failure surfaces as a red X on main (fix-forward or revert).
    - name: Cache the lean4checker build
      if: github.event_name != 'pull_request'
      uses: actions/cache@v3
      with:
        path: formal/.lake/lean4checker
        key: lean4checker-${{ runner.os }}-${{ hashFiles('formal/scripts/kernel-replay.sh', 'formal/lean-toolchain') }}

    - name: Kernel-replay all modules (lean4checker)
      if: github.event_name != 'pull_request'
      run: |
        export PATH="$HOME/.elan/bin:$PATH"
        bash scripts/kernel-replay.sh

