name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  # Manual "Run workflow" button: build + deploy ANY branch to GitHub Pages
  # without merging to main first (e.g. to preview a feature branch). The
  # heavy test suite is skipped on this path; only the Pages build gates the
  # deploy. NOTE: the button only appears once this workflow_dispatch trigger
  # is present on the DEFAULT branch (main) — GitHub reads dispatchability from
  # there — but the run executes the workflow file of the branch you select.
  workflow_dispatch:

# Pages deploy needs these; test jobs only read. Set workflow-wide to
# match the proven deploy config (slightly over-privileged for the test
# jobs, but avoids Pages-permission breakage).
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ---- parallel test jobs (no `needs:` => run concurrently) ----------

  format-check:
    # Skipped on a manual Pages preview (workflow_dispatch); gates push/PR only.
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '23'

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install dependencies
      run: npm install

    - name: Check PureScript formatting
      run: npx purs-tidy check "packages/**/*.purs"

    - name: Check Rust formatting
      run: cargo fmt --all --check

    - name: Run Rust clippy
      run: cargo clippy --workspace --all-targets -- -D warnings

  test-libs:
    if: github.event_name != 'workflow_dispatch'
    strategy:
      matrix:
        os: [ubuntu-latest-large]
    runs-on: ${{ matrix.os }}
    # Point the on-disk Lagrange-basis cache at a repo-root dir that actions/cache
    # persists across runs (below). Absolute so spawned worker threads write the
    # same dir regardless of cwd.
    env:
      SNARK_LAGRANGE_CACHE_DIR: ${{ github.workspace }}/lagrange-cache
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '23'

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
          packages/kimchi-napi/target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}

    - name: Cache SRS files
      uses: actions/cache@v3
      with:
        path: srs-cache/
        key: ${{ runner.os }}-srs-${{ hashFiles('mina/src/lib/crypto/proof-systems/srs/*.srs') }}

    # The Lagrange bases (the expensive FFTs) are deterministic — the same every
    # run — so a STATIC key suffices: populate once, inject thereafter. No need
    # to encode the crypto version in the key, because the cache is already
    # self-validating: each filename carries an SRS fingerprint (blake2b of the
    # generators), so if the crypto ever changes the bytes the fingerprint
    # changes too and old entries simply miss — never served wrong. Keyed
    # per-job (github.job) since test-libs and test-example warm different domain
    # sets and would otherwise fight over one key.
    - name: Cache Lagrange bases
      uses: actions/cache@v3
      with:
        path: lagrange-cache/
        key: ${{ runner.os }}-lagrange-${{ github.job }}

    - name: Install dependencies
      run: npm install

    - name: Populate SRS cache
      run: make fetch-srs

    - name: Test all libraries (excludes pickles-circuit-diffs)
      run: make test-libs
      env:
        NODE_OPTIONS: "--max-old-space-size=8192"

  test-example:
    if: github.event_name != 'workflow_dispatch'
    strategy:
      matrix:
        os: [ubuntu-latest-large]
    runs-on: ${{ matrix.os }}
    # Point the on-disk Lagrange-basis cache at a repo-root dir that actions/cache
    # persists across runs (below). Absolute so spawned worker threads write the
    # same dir regardless of cwd.
    env:
      SNARK_LAGRANGE_CACHE_DIR: ${{ github.workspace }}/lagrange-cache
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '23'

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
          packages/kimchi-napi/target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}

    - name: Cache SRS files
      uses: actions/cache@v3
      with:
        path: srs-cache/
        key: ${{ runner.os }}-srs-${{ hashFiles('mina/src/lib/crypto/proof-systems/srs/*.srs') }}

    # See test-libs: deterministic bases, static per-job key; the fingerprinted
    # filenames make it self-validating. Written here by the `run_simulation`
    # terminal worker (fsLagrangeCache); persisted across runs.
    - name: Cache Lagrange bases
      uses: actions/cache@v3
      with:
        path: lagrange-cache/
        key: ${{ runner.os }}-lagrange-${{ github.job }}

    - name: Install dependencies
      run: npm install

    - name: Populate SRS cache
      run: make fetch-srs

    - name: Generate linearization code
      run: make gen-linearization

    - name: Test example package
      run: make test-example
      env:
        NODE_OPTIONS: "--max-old-space-size=8192"

    # Runs only if the example tests passed (a failed step aborts the job).
    # Full one-block pipeline on the purs-backend-es optimized output:
    # circuit compile, genesis, 4 base proofs + 3 merges, root verification.
    - name: Run example simulation
      run: tools/run_simulation.sh
      env:
        NODE_OPTIONS: "--max-old-space-size=8192"

  test-circuit-diffs:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '23'

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
          packages/kimchi-napi/target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}

    - name: Cache SRS files
      uses: actions/cache@v3
      with:
        path: srs-cache/
        key: ${{ runner.os }}-srs-${{ hashFiles('mina/src/lib/crypto/proof-systems/srs/*.srs') }}

    - name: Install dependencies
      run: npm install

    - name: Populate SRS cache
      run: make fetch-srs

    - name: Unpack circuit-diff fixtures
      run: make fixtures-unpack

    - name: Test pickles-circuit-diffs
      run: make test-pickles-circuit-diffs
      env:
        NODE_OPTIONS: "--max-old-space-size=8192"
        # Witness-carrying registrations also solve on a Gen-sampled input and
        # embed the witness in their results JSON, for the Lean checker below.
        CIRCUIT_DIFFS_WITNESS_EXPORT: "1"

    # Run-scoped transport to the `check-ps-witness` job — the checker can only
    # ever see the witness its own commit generated.
    - name: Upload witness-carrying results for the Lean checker
      uses: actions/upload-artifact@v4
      with:
        name: circuit-diff-witnesses
        path: packages/pickles-circuit-diffs/circuits/results/*.json
        retention-days: 1

    # The visualizer bundles circuits/results/ into its dist (deployed to Pages);
    # the witness columns are checker input, not visualizer content — strip them.
    - name: Strip witnesses before the visualizer bundles results
      run: |
        for f in packages/pickles-circuit-diffs/circuits/results/*.json; do
          jq 'del(.purescript.witness)' "$f" > "$f.tmp" && mv "$f.tmp" "$f"
        done

    - name: Build circuit diff visualizer
      run: |
        cd packages/pickles-circuit-diffs/visualizer
        npm install
        npm run build
      env:
        NODE_OPTIONS: "--max-old-space-size=8192"
        PUBLIC_URL: /snarky/

    - name: Verify visualizer build output
      run: |
        test -f packages/pickles-circuit-diffs/visualizer/dist/index.html
        test -f packages/pickles-circuit-diffs/visualizer/dist/results/manifest.jsonl
        echo "Visualizer build verified: $(ls packages/pickles-circuit-diffs/visualizer/dist/*.js | wc -l) JS bundle(s), $(ls packages/pickles-circuit-diffs/visualizer/dist/*.css | wc -l) CSS bundle(s), $(ls packages/pickles-circuit-diffs/visualizer/dist/results/*.json | wc -l) circuit result(s)"

  # ---- verified witness check (Lean) ----------------------------------
  # The harness's witness-carrying results are checked against the Lean index
  # model (formal/kimchi/scripts/check_ps_witness.lean): decide `Satisfies` on the dumped
  # witness plus corruption rejections. Lives here (not lean.yml) because it
  # consumes the artifact from test-circuit-diffs — `needs:`/artifacts only span
  # a single workflow. On a Kimchi build-cache hit this is a few minutes; it
  # only rebuilds the library when `formal/` changed (in parallel with lean.yml
  # doing the same).
  check-ps-witness:
    if: github.event_name != 'workflow_dispatch'
    needs: test-circuit-diffs
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        # Skip the large `mina` submodule; only the Lean dependency submodules
        # are needed.
        submodules: false

    - name: Check out the Lean dependency submodule (CompElliptic)
      run: git submodule update --init formal/vendor/CompElliptic

    - name: Setup Lean + build the library
      uses: ./.github/actions/setup-lean

    - name: Download the witness-carrying results
      uses: actions/download-artifact@v4
      with:
        name: circuit-diff-witnesses
        path: packages/pickles-circuit-diffs/circuits/results/

    - name: Check witnesses against the index model
      run: |
        export PATH="$HOME/.elan/bin:$PATH"
        cd formal
        export PATH="$HOME/.elan/bin:$PATH"
        lake env lean kimchi/scripts/check_ps_witness.lean

  # ---- build the example app for GitHub Pages -------------------------
  # The in-browser block-pipeline app: wasm kimchi backend + vite bundle,
  # base-pathed for the project page (/snarky/). Heavy (wasm + backend-es
  # build), so it runs only on the deploy paths (push to main, or a manual
  # workflow_dispatch preview of any branch); PRs still compile the app's
  # PureScript via the test-example job.

  build-pages:
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest-large
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '23'

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
          packages/kimchi-napi/target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock', 'rust-toolchain.toml') }}

    - name: Install dependencies
      run: npm install

    - name: Generate linearization code
      run: make gen-linearization

    - name: Build wasm kimchi backend
      run: npm run build:wasm -w kimchi-napi

    - name: Build the browser app (production, base /snarky/)
      run: npm run bundle -w example-app
      env:
        VITE_BASE: /snarky/
        NODE_OPTIONS: "--max-old-space-size=8192"

    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: packages/example/app/web/dist

  # ---- synchronization point: deploy ---------------------------------
  # Two deploy paths:
  #   * push to main  -> deploy iff the FULL test suite + build-pages are green
  #     (the test jobs run on this event and must all succeed).
  #   * workflow_dispatch (any branch) -> the test jobs are skipped, so gate
  #     the preview deploy on build-pages alone.
  # always() lets this `if` evaluate even when the test jobs were skipped (the
  # dispatch path); on pull_request, build-pages is skipped so deploy is too.

  deploy:
    needs: [format-check, test-libs, test-example, test-circuit-diffs, build-pages]
    if: >-
      always() && needs.build-pages.result == 'success'
      && (
        github.event_name == 'workflow_dispatch'
        || (
          github.event_name == 'push' && github.ref == 'refs/heads/main'
          && needs.format-check.result == 'success'
          && needs.test-libs.result == 'success'
          && needs.test-example.result == 'success'
          && needs.test-circuit-diffs.result == 'success'
        )
      )
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
