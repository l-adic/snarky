name = "bulletproof-pcs"
# Share the aggregator workspace's dependency checkouts (one Mathlib for every
# package workspace — the editor opens files with the package as the root).
packagesDir = "../.lake/packages"
defaultTargets = ["Bulletproof"]
# `lake lint` (standalone): Batteries' env-linter suite over this package's roots.
lintDriver = "batteries/runLinter"
lintDriverArgs = ["Bulletproof", "BulletproofFixture"]

# In-editor style feedback in Mathlib-importing modules (the ≤100-column contract);
# `weak.` so builds survive a linter rename. scripts/check-style.sh stays the CI gate —
# it also covers the Mathlib-free and targeted-import modules these linters can't see.
[leanOptions]
weak.linter.style.longLine = true

# CompElliptic: the Pasta fields and curves the wire verifier is instantiated at.
[[require]]
name = "CompElliptic"
git = "https://github.com/daira/CompElliptic"
rev = "a549e4555b17bbbe3c8d48aa7d5b493912ccfbe9"

# The Pasta trust base: hasse-pinned group orders, the point-group module structure,
# and the wire scalar-shift algebra (`Pasta.Shifted`).
[[require]]
name = "pasta"
path = "../pasta"

# The Poseidon sponge (the Fiat-Shamir instantiation) + the shared fixture kit.
[[require]]
name = "poseidon"
path = "../poseidon"

[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.30.0"

[[lean_lib]]
name = "Bulletproof"
globs = ["Bulletproof", "Bulletproof.+"]

# Fixture ingestion for the proof-systems IPA dumps — the fixture-validation tier,
# outside the proof library (the poseidon package's FixtureKit split, likewise).
[[lean_lib]]
name = "BulletproofFixture"
globs = ["BulletproofFixture"]
