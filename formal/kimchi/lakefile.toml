name = "kimchi"
# Share the aggregator workspace's dependency checkouts (one Mathlib for every
# package workspace — the editor opens files with the package as the root).
packagesDir = "../.lake/packages"
defaultTargets = ["Kimchi", "KimchiFixture", "kimchi-demo"]
# `lake lint` (standalone): Batteries' env-linter suite over this package's library
# roots. The nolints baseline is scripts/nolints.json (kept in sync with the workspace
# copy at ../scripts/nolints.json).
lintDriver = "batteries/runLinter"
lintDriverArgs = ["Kimchi", "KimchiFixture"]

# In-editor style feedback in Mathlib-importing modules (the ≤100-column contract);
# `weak.` so builds survive a linter rename. scripts/check-style.sh stays the CI gate —
# it also covers the Mathlib-free and targeted-import modules these linters can't see.
[leanOptions]
weak.linter.style.longLine = true

# CompElliptic: concrete short-Weierstrass `SWCurve` / `SWPoint` with a proven group law,
# and the Pasta curve instances. Vendored as a git submodule at vendor/CompElliptic so the
# revision is locked to this repo rather than floating on upstream main.
[[require]]
name = "CompElliptic"
path = "../vendor/CompElliptic"

# The Pasta curve trust base: the generic EC order/shape sugar, the concrete GLV constants,
# the Hasse/CM axioms and their derived orders, and the point-group module structure.
# Lives in-repo as a standalone path package (formal/pasta).
[[require]]
name = "pasta"
path = "../pasta"

# The Poseidon sponge specification + the shared fixture kit (formal/poseidon).
[[require]]
name = "poseidon"
path = "../poseidon"

# The IPA polynomial commitment scheme: abstract soundness, the executable wire verifier,
# and its Poseidon Fiat-Shamir instantiation (formal/bulletproof-pcs).
[[require]]
name = "bulletproof-pcs"
path = "../bulletproof-pcs"

# Mathlib gives us prime fields (`ZMod p`) and the elliptic-curve group law
# (`WeierstrassCurve.Affine`), the trusted oracle the EC gates are checked against. Pinned to
# the tag matching our Lean toolchain (v4.30.0). Kept LAST so this direct pin wins over the
# mathlib revision CompElliptic/CompPoly/Zcash pull in transitively.
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.30.0"

[[lean_lib]]
name = "Kimchi"

# The JSON decoders the fixture-check scripts read production dumps with. Kept OUT of the
# `Kimchi` library — checking against recorded data is not part of the development — and
# built as its own target, mirroring `FixtureKit` and `BulletproofFixture`.
[[lean_lib]]
name = "KimchiFixture"
globs = ["KimchiFixture", "KimchiFixture.+"]


[[lean_exe]]
name = "kimchi-demo"
root = "Main"
