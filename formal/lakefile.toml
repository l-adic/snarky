name = "kimchi-formal"
# Default build = the verified library (all gate/circuit proofs). The `kimchi-demo`
# executable is intentionally NOT a default target: linking a native binary that
# transitively pulls the whole Mathlib closure overflows the linker command line on
# macOS. Run the checker through the interpreter instead (no native link):
#   lake env lean --run Main.lean fixtures/add_complete_step.json
defaultTargets = ["Kimchi"]

# Mathlib gives us prime fields (`ZMod p`) and the elliptic-curve group law
# (`WeierstrassCurve.Affine`), the trusted oracle the EC gates are checked
# against. Pinned to the tag matching our Lean toolchain (v4.28.0).
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.28.0"

[[lean_lib]]
name = "Kimchi"

[[lean_exe]]
name = "kimchi-demo"
root = "Main"
