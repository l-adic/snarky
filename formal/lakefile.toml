# The l-adic formal-verification workspace. This root package is a pure AGGREGATOR — it
# owns no libraries. Every component is a standalone path-required package, none
# privileged:
#
#   pasta/           the Pasta curve trust base (Hasse/CM axioms live here)
#   poseidon/        the Poseidon sponge spec + the shared fixture kit
#   bulletproof-pcs/ the IPA polynomial commitment + its Fiat-Shamir instantiation
#   kimchi/          the kimchi protocol formalization (arithmetization, PIOP, verifier,
#                    soundness capstones)
#   snarky/          the deep-embedded circuit DSL (sits on top of kimchi via its bridge)
#
# Each package builds standalone from its own directory and carries its own scripts
# (axiom gates, fixture checks, API manifest). Building/running from HERE puts everything
# in one shared workspace (one Mathlib), which is how CI drives all of it. The only
# scripts at this level are the genuinely workspace-wide tools: scripts/check-style.sh
# (the formatter contract) and scripts/deadcode.{lean,sh} (cross-package reachability
# over the union of the packages' roots.txt manifests).
name = "formal"

[[require]]
name = "pasta"
path = "pasta"

[[require]]
name = "poseidon"
path = "poseidon"

[[require]]
name = "bulletproof-pcs"
path = "bulletproof-pcs"

[[require]]
name = "kimchi"
path = "kimchi"

[[require]]
name = "snarky"
path = "snarky"

# Direct mathlib pin (matching the toolchain) so this workspace's resolution wins over
# anything the packages pull in transitively.
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.30.0"
