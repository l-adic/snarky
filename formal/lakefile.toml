name = "kimchi-formal"
defaultTargets = ["Kimchi", "Snarky", "kimchi-demo"]

# CompElliptic: concrete short-Weierstrass `SWCurve` / `SWPoint` with a proven group law,
# and the Pasta curve instances. Vendored as a git submodule at vendor/CompElliptic so the
# revision is locked to this repo rather than floating on upstream main.
[[require]]
name = "CompElliptic"
path = "vendor/CompElliptic"

# Ironwood (l-adic fork of zcash/ironwood): the Zcash team's Lean formalization of the Orchard/halo2
# inner-product-argument polynomial commitment — the SAME protocol as kimchi's IPA (identical
# `b_poly = ∏(1 + uⱼ·x^{2ʲ})` and `[uⱼ⁻¹]Lⱼ + [uⱼ]Rⱼ` recombination). Provides the sorry/axiom-free
# `ipa_soundV` tree-extraction and `commitmentBinding_iff_no_relation`. Vendored as a submodule at
# vendor/ironwood; forked to l-adic and pinned to official Lean/Mathlib v4.30.0. The Lake package name
# is `Zcash` (`import Zcash.Snark.Soundness.IpaSoundness`). It requires CompElliptic from git, but our
# root path-require above (same commit 12c0bc5) takes precedence, so there is one shared CompElliptic.
[[require]]
name = "Zcash"
path = "vendor/ironwood"

# The Pasta curve trust base: the generic EC order/shape sugar, the concrete GLV constants,
# the Hasse/CM axioms and their derived orders, and the point-group module structure.
# Lives in-repo as a standalone path package (formal/pasta).
[[require]]
name = "pasta"
path = "pasta"

# The Poseidon sponge specification + the shared fixture kit (formal/poseidon).
[[require]]
name = "poseidon"
path = "poseidon"

# The IPA polynomial commitment scheme: abstract soundness, the executable wire verifier,
# and its Poseidon Fiat-Shamir instantiation (formal/bulletproof-pcs).
[[require]]
name = "bulletproof-pcs"
path = "bulletproof-pcs"

# Mathlib gives us prime fields (`ZMod p`) and the elliptic-curve group law
# (`WeierstrassCurve.Affine`), the trusted oracle the EC gates are checked against. Pinned to
# the tag matching our Lean toolchain (v4.30.0). Kept LAST so this direct pin wins over the
# mathlib revision CompElliptic/CompPoly/Zcash pull in transitively.
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.30.0"

[[lean_lib]]
name = "Kimchi"

# Snarky: a deep-embedded port of the PureScript circuit-building DSL
# (packages/snarky/src/Snarky/Circuit/DSL/Monad.purs). Lives beside Kimchi so the
# "no circuit monad" stance of the Kimchi.* namespace stays true. The core (`import Snarky`)
# is Mathlib-free and builds in seconds; the `Snarky.Kimchi.*` bridge submodules import
# Kimchi (and thus Mathlib), so the glob builds them without the root pulling them in.
[[lean_lib]]
name = "Snarky"
globs = ["Snarky", "Snarky.+"]

[[lean_exe]]
name = "kimchi-demo"
root = "Main"
