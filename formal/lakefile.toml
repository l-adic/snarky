name = "kimchi-formal"
defaultTargets = ["Kimchi", "kimchi-demo"]

# Mathlib gives us prime fields (`ZMod p`) and the elliptic-curve group law
# (`WeierstrassCurve.Affine`), the trusted oracle the EC gates are checked
# against. Pinned to the tag matching our Lean toolchain (v4.31.0).
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.31.0"

# CompElliptic: SW group law + concrete Pasta SWCurve/SWPoint instances (replaces our
# axiomatized CMCurve boilerplate; order_prime via Pratt certificate, group law concrete).
[[require]]
name = "CompElliptic"
git = "https://github.com/daira/CompElliptic.git"
rev = "main"

[[lean_lib]]
name = "Kimchi"

[[lean_exe]]
name = "kimchi-demo"
root = "Main"
