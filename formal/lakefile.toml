# The l-adic formal-verification workspace. This root package is a pure AGGREGATOR — it
# owns no libraries. Every component is a standalone path-required package, none
# privileged:
#
#   pasta/           the Pasta curve trust base (Hasse/CM axioms live here)
#   poseidon/        the Poseidon sponge spec + the shared fixture kit
#   bulletproof-pcs/ the IPA polynomial commitment + its Fiat-Shamir instantiation
#   kimchi/          the kimchi protocol formalization (arithmetization, PIOP, verifier,
#                    soundness capstones)
#   snarky/          the deep-embedded circuit DSL (sits on top of kimchi via its bridge)
#
# Each package builds standalone from its own directory and carries its own scripts
# (axiom gates, fixture checks, API manifest). Building/running from HERE puts everything
# in one shared workspace (one Mathlib), which is how CI drives all of it. The scripts at
# this level are the genuinely workspace-wide tools: scripts/check-style.sh (the
# formatter contract), scripts/deadcode.{lean,sh} (cross-package reachability over the
# union of the packages' roots.txt manifests), scripts/module-deps.sh (the dependency
# graph artifact), scripts/prune-stale-oleans.sh (build-dir garbage collection), and
# scripts/kernel-replay.sh (the lean4checker gate); plus the lint/shake policy files
# scripts/{nolints,noshake}.json.
name = "formal"

# `lake lint` — Batteries' `@[env_linter]` suite (docBlame, unusedArguments, synTaut, …)
# over every library root in the workspace. The args list every root module; the nolints
# baseline (derive-generated instances and by-design findings only) is scripts/nolints.json,
# which runLinter reads relative to the cwd — run `lake lint` from formal/. Packages that
# need nolints entries keep their own copy for standalone runs; keep the copies in sync.
# CAVEAT: one run over all eight modules needs a lot of RAM (each module's import
# environment accumulates); CI and `make lean-lint` run one runLinter process per module.
lintDriver = "batteries/runLinter"
lintDriverArgs = [
  "Kimchi", "KimchiFixture", "Snarky", "Pasta", "Poseidon", "FixtureKit",
  "Bulletproof", "BulletproofFixture"
]

[[require]]
name = "pasta"
path = "pasta"

[[require]]
name = "poseidon"
path = "poseidon"

[[require]]
name = "bulletproof-pcs"
path = "bulletproof-pcs"

[[require]]
name = "kimchi"
path = "kimchi"

[[require]]
name = "snarky"
path = "snarky"

# Direct mathlib pin (matching the toolchain) so this workspace's resolution wins over
# anything the packages pull in transitively.
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.30.0"
