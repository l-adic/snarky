name = "poseidon"
# Share the aggregator workspace's dependency checkouts (one Mathlib for every
# package workspace — the editor opens files with the package as the root).
packagesDir = "../.lake/packages"
defaultTargets = ["Poseidon", "FixtureKit"]
# `lake lint` (standalone): Batteries' env-linter suite over this package's roots.
lintDriver = "batteries/runLinter"
lintDriverArgs = ["Poseidon", "FixtureKit"]

# In-editor style feedback in Mathlib-importing modules (the ≤100-column contract);
# `weak.` so builds survive a linter rename. scripts/check-style.sh stays the CI gate —
# it also covers the Mathlib-free and targeted-import modules these linters can't see.
[leanOptions]
weak.linter.style.longLine = true

# CompElliptic: the Pasta fields (`ZMod p` with primality certificates) and curves.
[[require]]
name = "CompElliptic"
git = "https://github.com/daira/CompElliptic"
rev = "a549e4555b17bbbe3c8d48aa7d5b493912ccfbe9"

# The Pasta trust base: the GLV constants (`Pasta.vestaLam` seeds the Fr-sponge
# challenge-expansion spec).
[[require]]
name = "pasta"
path = "../pasta"

# Mathlib (targeted imports only — the sponge stack stays on the fast lane).
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.30.0"

[[lean_lib]]
name = "Poseidon"
globs = ["Poseidon", "Poseidon.+"]

# Shared fixture-parsing/trace-check kit (not Poseidon-specific; reused downstream).
[[lean_lib]]
name = "FixtureKit"
globs = ["FixtureKit", "FixtureKit.+"]
