name = "snarky"
# Share the aggregator workspace's dependency checkouts (one Mathlib for every
# package workspace — the editor opens files with the package as the root).
packagesDir = "../.lake/packages"
defaultTargets = ["Snarky"]

# The kimchi formalization: the `Snarky.Kimchi.*` bridge modules interpret the DSL's
# reified circuits against the verified `Kimchi.Gate.Generic` checker. The core
# (`import Snarky`) is dependency-free and Mathlib-free — only the bridge pulls this in.
[[require]]
name = "kimchi"
path = "../kimchi"

[[lean_lib]]
name = "Snarky"
globs = ["Snarky", "Snarky.+"]
