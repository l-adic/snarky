# Separate Spago workspace (NOT a member of the root workspace) — the
# same pattern as packages/pickles-bench.
#
# Per spago's monorepo rules, a spago.yaml carrying its own
# `workspace:` section — and its subfolders — is ignored by any
# enclosing workspace. So the root workspace never sees
# example-simulation and never pays the purs-backend-es cost; that
# optimizer lives only here, where the long-running simulation wants
# optimized codegen. The `example` package itself (and its test suite)
# stays in the root workspace, pulled in here as a local `path:`
# dependency.
#
# Build/run via `tools/run_simulation.sh` (it `cd`s here; `spago run`
# does NOT work with the purs-backend-es backend).
workspace:
  packageSet:
    registry: 71.0.0
  backend:
    cmd: purs-backend-es
    args:
      - build
  extraPackages:
    colog-core:
      git: https://github.com/l-adic/purescript-colog.git
      ref: 36636ecf70dbb1ae67ed6dee7fa7922f10deb578
      subdir: packages/colog-core
    colog:
      git: https://github.com/l-adic/purescript-colog.git
      ref: 36636ecf70dbb1ae67ed6dee7fa7922f10deb578
      subdir: packages/colog
    blake2:
      path: ../blake2
    curves:
      path: ../curves
    example:
      path: ../example
    merkle-tree:
      path: ../merkle-tree
    pickles:
      path: ../pickles
    pickles-linearization-types:
      path: ../pickles-linearization-types
    poseidon:
      path: ../poseidon
    random-oracle:
      path: ../random-oracle
    schnorr:
      path: ../schnorr
    snarky:
      path: ../snarky
    snarky-curves:
      path: ../snarky-curves
    snarky-kimchi:
      path: ../snarky-kimchi
    snarky-test-utils:
      path: ../snarky-test-utils
    union-find:
      path: ../union-find
    vector-sized:
      path: ../sized-vector
package:
  name: example-simulation
  dependencies:
    - aff
    - colog
    - effect
    - example
    - fmt
    - foldable-traversable
    - pickles
    - prelude
    - refs
    - schnorr
  build:
    strict: true
  run:
    main: Snarky.Example.Main
