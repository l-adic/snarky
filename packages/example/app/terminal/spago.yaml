# The terminal (node TUI) frontend of the example simulation — sibling
# of web/ (the browser frontend). Entry: Snarky.Example.Main, launched
# by terminal/run.mjs via tools/run_simulation.sh. Both packages share
# this workspace's purs-backend-es output.
package:
  name: example-simulation-terminal
  dependencies:
    - aff
    - avar
    - colog
    - effect
    - either
    - example
    - exceptions
    - fmt
    - foldable-traversable
    - integers
    - maybe
    - node-process
    - node-workerbees
    - pickles
    - prelude
    - refs
    - run
    - schnorr
    - tuples
    - variant
  build:
    strict: true
  run:
    main: Snarky.Example.Main
